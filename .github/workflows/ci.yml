name: ci

# Lightweight check: compile, import, smoke-test the CLI, validate the baked
# index, and confirm the shipped web artifact makes no external requests.
# No network, no keys, no external services.

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pytest (the pipeline itself has no runtime deps)
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Byte-compile the package
        run: python -m compileall -q revalign_teardown

      - name: Import the package
        run: python -c "import revalign_teardown; print('revalign_teardown', revalign_teardown.__version__)"

      - name: Smoke-test the CLI (--help, no network)
        run: python -m revalign_teardown --help

      - name: Run the offline test suite
        run: python -m pytest -q
